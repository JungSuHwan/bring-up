<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LiDAR Controller</title>
  <style>
    :root {
      --bg: #0f131b;
      --panel: #171d27;
      --line: #2a3344;
      --text: #ecf1fb;
      --muted: #9aa7be;
      --accent: #59b7ff;
      --good: #90e39a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", "Noto Sans KR", sans-serif; }
    .app { max-width: 920px; margin: 0 auto; padding: 14px; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .title { font-weight: 700; font-size: 20px; }
    .status { font-size: 13px; color: var(--muted); font-family: Consolas, "Courier New", monospace; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .grid { display: grid; grid-template-columns: 70px 1fr auto auto auto; gap: 8px; align-items: center; }
    .grid + .grid { margin-top: 8px; }
    select, input {
      background: #0e1420;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      min-height: 38px;
    }
    button {
      background: #1d2a3f;
      color: var(--text);
      border: 1px solid #2d466c;
      border-radius: 8px;
      min-height: 38px;
      padding: 0 12px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    .ok { color: var(--good); }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="title">LiDAR x/y/z/yaw Controller</div>
      <div id="status" class="status">connecting...</div>
    </div>

    <div class="card">
      <div class="row">
        <label for="lidarSel">LiDAR</label>
        <select id="lidarSel"></select>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="saveJsonBtn" type="button">Save JSON</button>
        <button id="reloadJsonBtn" type="button">Reload JSON</button>
        <span id="syncInfo" class="status">Sync: -</span>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <label for="stepInput">XYZ step (m)</label>
        <input id="stepInput" type="number" min="0.001" max="1" step="0.001" value="0.01" />
        <button id="applyStepBtn" type="button">Apply XYZ Step</button>
        <label for="yawStepInput">Yaw step (deg)</label>
        <input id="yawStepInput" type="number" min="0.1" max="20" step="0.1" value="0.5" />
        <button id="applyYawStepBtn" type="button">Apply Yaw Step</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <label><input id="alertEnabled" type="checkbox" /> 2D Alert Enabled</label>
        <label for="alertMinInput">Alert Min (m)</label>
        <input id="alertMinInput" type="number" min="0" max="100" step="0.01" value="0.0" />
        <label for="alertMaxInput">Alert Max (m)</label>
        <input id="alertMaxInput" type="number" min="0" max="100" step="0.01" value="1.5" />
        <button id="applyAlertBtn" type="button">Apply Alert Threshold</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <label>View Angle(deg)</label>
        <label for="viewMinInput">Min</label>
        <input id="viewMinInput" type="number" min="-180" max="180" step="1" value="-180" style="width:70px;" />
        <label for="viewMaxInput">Max</label>
        <input id="viewMaxInput" type="number" min="-180" max="180" step="1" value="180" style="width:70px;" />
        <button id="applyViewBtn" type="button">Apply View Angle</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="calibStartBtn" type="button">Calibration Start</button>
        <button id="calibStopBtn" type="button">Calibration Stop</button>
        <button id="autoIcpBtn" type="button" style="border-color:var(--accent); color:var(--accent);">Auto ICP (Match)</button>
        <span id="calibInfo" class="status">RMSE: -</span>
      </div>
      <div class="row" style="margin-top:8px;">
        <label for="calibMaxDistInput">Calib MaxDist (m)</label>
        <input id="calibMaxDistInput" type="number" min="0.2" max="20" step="0.1" value="4.0" style="width:90px;" />
        <label for="calibVertRangeInput">Calib VertRange (m)</label>
        <input id="calibVertRangeInput" type="number" min="0.01" max="5" step="0.01" value="0.35" style="width:90px;" />
        <label for="calibAngleMinInput">Calib Angle Min</label>
        <input id="calibAngleMinInput" type="number" min="-360" max="360" step="1" value="-55" style="width:80px;" />
        <label for="calibAngleMaxInput">Calib Angle Max</label>
        <input id="calibAngleMaxInput" type="number" min="-360" max="360" step="1" value="230" style="width:80px;" />
        <button id="applyCalibOptBtn" type="button">Apply Calib ROI</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="recordStartBtn" type="button" style="border-color:#ff4444; color:#ff4444;">🔴 Record Start</button>
        <button id="recordStopBtn" type="button" style="border-color:#888; color:#a0a0a0;">⬛ Record Stop</button>
        <span id="recordInfo" class="status">Rec: OFF</span>
      </div>
    </div>

    <div class="card">
      <div class="grid">
        <div>X</div>
        <input id="xInput" type="number" step="0.001" />
        <button id="setXBtn" type="button">Set</button>
        <button id="decXBtn" type="button">-</button>
        <button id="incXBtn" type="button">+</button>
      </div>
      <div class="grid">
        <div>Y</div>
        <input id="yInput" type="number" step="0.001" />
        <button id="setYBtn" type="button">Set</button>
        <button id="decYBtn" type="button">-</button>
        <button id="incYBtn" type="button">+</button>
      </div>
      <div class="grid">
        <div>Z</div>
        <input id="zInput" type="number" step="0.001" />
        <button id="setZBtn" type="button">Set</button>
        <button id="decZBtn" type="button">-</button>
        <button id="incZBtn" type="button">+</button>
      </div>
      <div class="grid">
        <div>Yaw</div>
        <input id="yawInput" type="number" step="0.1" />
        <button id="setYawBtn" type="button">Set</button>
        <button id="decYawBtn" type="button">-</button>
        <button id="incYawBtn" type="button">+</button>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="resetXYZBtn" type="button">Reset XYZ</button>
        <button id="resetYawBtn" type="button">Reset Yaw</button>
        <span class="status">applies in realtime via <span class="ok">/control</span></span>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const lidarSel = $("lidarSel");
    const stepInput = $("stepInput");
    const yawStepInput = $("yawStepInput");
    const xInput = $("xInput");
    const yInput = $("yInput");
    const zInput = $("zInput");
    const yawInput = $("yawInput");
    const alertEnabled = $("alertEnabled");
    const alertMinInput = $("alertMinInput");
    const alertMaxInput = $("alertMaxInput");
    const viewMinInput = $("viewMinInput");
    const viewMaxInput = $("viewMaxInput");
    const calibMaxDistInput = $("calibMaxDistInput");
    const calibVertRangeInput = $("calibVertRangeInput");
    const calibAngleMinInput = $("calibAngleMinInput");
    const calibAngleMaxInput = $("calibAngleMaxInput");
    const calibInfo = $("calibInfo");
    const syncInfo = $("syncInfo");
    const recordInfo = $("recordInfo");
    let lastState = {};

    function fmtTime(sec) {
      if (!sec || !Number.isFinite(Number(sec))) return "-";
      const d = new Date(Number(sec) * 1000);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function isFieldEditing(el) {
      return document.activeElement === el;
    }

    async function apiControl(action, payload = {}) {
      const res = await fetch("/control", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action, ...payload }),
      });
      if (!res.ok) throw new Error("control failed");
      return res.json();
    }

    async function refreshState() {
      try {
        const res = await fetch("/lidar_state", { cache: "no-store" });
        if (!res.ok) throw new Error("state unavailable");
        const data = await res.json();
        lastState = data;
        const lidars = Array.isArray(data.lidars) ? data.lidars : [];
        const prev = lidarSel.value;
        lidarSel.innerHTML = "";
        for (const l of lidars) {
          const o = document.createElement("option");
          o.value = l.name;
          o.textContent = l.name;
          lidarSel.appendChild(o);
        }
        if (prev && lidars.some((l) => l.name === prev)) lidarSel.value = prev;
        else if (data.selected_name) lidarSel.value = data.selected_name;

        if (typeof data.step === "number" && !isFieldEditing(stepInput)) stepInput.value = data.step.toFixed(3);
        if (typeof data.yaw_step_deg === "number" && !isFieldEditing(yawStepInput)) yawStepInput.value = data.yaw_step_deg.toFixed(2);
        const at = data.alert_threshold || {};
        if (document.activeElement !== alertEnabled) alertEnabled.checked = !!at.enabled;
        if (!isFieldEditing(alertMinInput) && typeof at.min_m === "number") alertMinInput.value = Number(at.min_m).toFixed(2);
        if (!isFieldEditing(alertMaxInput) && typeof at.max_m === "number") alertMaxInput.value = Number(at.max_m).toFixed(2);

        const selected = lidars.find((l) => l.name === lidarSel.value) || lidars[0];
        const va = selected ? (selected.view_angle || {}) : {};
        if (!isFieldEditing(viewMinInput) && typeof va.min_deg === "number") viewMinInput.value = Number(va.min_deg).toFixed(1);
        if (!isFieldEditing(viewMaxInput) && typeof va.max_deg === "number") viewMaxInput.value = Number(va.max_deg).toFixed(1);
        const copt = data.calibration_options || {};
        if (!isFieldEditing(calibMaxDistInput) && typeof copt.max_distance_m === "number") calibMaxDistInput.value = Number(copt.max_distance_m).toFixed(2);
        if (!isFieldEditing(calibVertRangeInput) && typeof copt.vertical_range_m === "number") calibVertRangeInput.value = Number(copt.vertical_range_m).toFixed(2);
        if (!isFieldEditing(calibAngleMinInput) && typeof copt.angle_min_deg === "number") calibAngleMinInput.value = Number(copt.angle_min_deg).toFixed(1);
        if (!isFieldEditing(calibAngleMaxInput) && typeof copt.angle_max_deg === "number") calibAngleMaxInput.value = Number(copt.angle_max_deg).toFixed(1);

        const rv = data.robot_velocity || {};
        const speedMps = Number(rv.speed_mps || 0);
        const speedKph = Number(rv.speed_kph || 0);
        const calib = data.calibration || {};
        const rmseRaw = calib.rmse_m;
        const rmseEma = calib.rmse_ema_m;
        const rmseText = (typeof rmseRaw === "number") ? rmseRaw.toFixed(3) : "-";
        const rmseEmaText = (typeof rmseEma === "number") ? rmseEma.toFixed(3) : "-";
        const note = String(calib.note || "idle");
        const n = Number(calib.sample_count || 0);
        const mp = Number(calib.map_point_count || 0);
        const target = String(calib.selected_name || "-");
        const active = !!calib.active;
        calibInfo.textContent = `Calib:${active ? "ON" : "OFF"} target=${target} rmse=${rmseText}m ema=${rmseEmaText}m n=${n} map=${mp} note=${note}`;
        
        const isLogging = !!data.is_logging;
        recordInfo.textContent = `Rec: ${isLogging ? "ON (Recording...)" : "OFF"}`;
        recordInfo.style.color = isLogging ? "#ff4444" : "var(--text-dim)";
        
        const sync = data.config_sync || {};
        const action = String(sync.last_action || "-");
        const loaded = fmtTime(sync.last_loaded_s);
        const saved = fmtTime(sync.last_saved_s);
        const err = String(sync.last_error || "");
        syncInfo.textContent = `Sync:${action} loaded=${loaded} saved=${saved}${err ? ` err=${err}` : ""}`;
        if (selected) {
          const off = selected.offset || { x: 0, y: 0, z: 0 };
          if (!isFieldEditing(xInput)) xInput.value = Number(off.x || 0).toFixed(3);
          if (!isFieldEditing(yInput)) yInput.value = Number(off.y || 0).toFixed(3);
          if (!isFieldEditing(zInput)) zInput.value = Number(off.z || 0).toFixed(3);
          if (!isFieldEditing(yawInput)) yawInput.value = Number(selected.yaw_deg || 0).toFixed(2);
          statusEl.textContent = `connected | lidar=${selected.name} | up=${!!selected.connected} | fps=${Number(selected.fps || 0).toFixed(1)} | v=${speedMps.toFixed(2)}m/s (${speedKph.toFixed(2)}km/h)`;
        } else {
          statusEl.textContent = `connected | no lidar | v=${speedMps.toFixed(2)}m/s (${speedKph.toFixed(2)}km/h)`;
        }
      } catch (e) {
        statusEl.textContent = `disconnected | ${e}`;
      }
    }

    function selectedName() {
      return lidarSel.value || "";
    }

    async function setAxis(axis, value) {
      const name = selectedName();
      if (!name) return;
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return;
      await apiControl("lidar_offset_set", { name, [axis]: parsed });
      await refreshState();
    }

    async function deltaAxis(axis, sign) {
      const name = selectedName();
      if (!name) return;
      const step = Number(stepInput.value || 0.01);
      await apiControl("lidar_offset_delta", { name, axis, delta: sign * step });
      await refreshState();
    }

    async function setYaw(value) {
      const name = selectedName();
      if (!name) return;
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return;
      await apiControl("lidar_yaw_set", { name, yaw_deg: parsed });
      await refreshState();
    }

    async function deltaYaw(sign) {
      const name = selectedName();
      if (!name) return;
      const step = Number(yawStepInput.value || 0.5);
      await apiControl("lidar_yaw_delta", { name, delta_deg: sign * step });
      await refreshState();
    }

    function bindEnter(el, fn) {
      if (!el) return;
      el.addEventListener("keydown", async (e) => {
        if (e.key !== "Enter") return;
        e.preventDefault();
        try {
          await fn();
        } catch (_) {}
      });
    }

    $("refreshBtn").addEventListener("click", refreshState);
    $("saveJsonBtn").addEventListener("click", async () => {
      await apiControl("config_save_now", {});
      await refreshState();
    });
    $("reloadJsonBtn").addEventListener("click", async () => {
      await apiControl("config_reload_now", {});
      await refreshState();
    });
    $("applyStepBtn").addEventListener("click", async () => {
      await apiControl("offset_set_step", { step: Number(stepInput.value || 0.01) });
      await refreshState();
    });
    $("applyYawStepBtn").addEventListener("click", async () => {
      await apiControl("yaw_set_step", { yaw_step_deg: Number(yawStepInput.value || 0.5) });
      await refreshState();
    });
    $("applyAlertBtn").addEventListener("click", async () => {
      await apiControl("alert_threshold_set", {
        enabled: !!alertEnabled.checked,
        min_m: Number(alertMinInput.value || 0),
        max_m: Number(alertMaxInput.value || 0),
      });
      await refreshState();
      await refreshState();
    });
    
    $("applyViewBtn").addEventListener("click", async () => {
      await apiControl("view_angle_set", {
        min_deg: Number(viewMinInput.value || -180.0),
        max_deg: Number(viewMaxInput.value || 180.0),
      });
      await refreshState();
      await refreshState();
    });

    $("recordStartBtn").addEventListener("click", async () => {
      await apiControl("record_start");
      await refreshState();
    });
    $("recordStopBtn").addEventListener("click", async () => {
      await apiControl("record_stop");
      await refreshState();
    });

    $("calibStartBtn").addEventListener("click", async () => {
      await apiControl("calibration_start", { name: selectedName() });
      await refreshState();
    });
    $("calibStopBtn").addEventListener("click", async () => {
      await apiControl("calibration_stop", {});
      await refreshState();
    });
    $("autoIcpBtn").addEventListener("click", async () => {
      $("calibInfo").textContent = "Auto ICP Running...";
      await apiControl("auto_icp", { name: selectedName() });
      await refreshState();
    });
    $("applyCalibOptBtn").addEventListener("click", async () => {
      await apiControl("calibration_options_set", {
        max_distance_m: Number(calibMaxDistInput.value || 4.0),
        vertical_range_m: Number(calibVertRangeInput.value || 0.35),
        angle_min_deg: Number(calibAngleMinInput.value || -55.0),
        angle_max_deg: Number(calibAngleMaxInput.value || 230.0),
      });
      await refreshState();
    });

    $("setXBtn").addEventListener("click", () => setAxis("x", xInput.value));
    $("setYBtn").addEventListener("click", () => setAxis("y", yInput.value));
    $("setZBtn").addEventListener("click", () => setAxis("z", zInput.value));
    $("setYawBtn").addEventListener("click", () => setYaw(yawInput.value));

    $("decXBtn").addEventListener("click", () => deltaAxis("x", -1));
    $("incXBtn").addEventListener("click", () => deltaAxis("x", +1));
    $("decYBtn").addEventListener("click", () => deltaAxis("y", -1));
    $("incYBtn").addEventListener("click", () => deltaAxis("y", +1));
    $("decZBtn").addEventListener("click", () => deltaAxis("z", -1));
    $("incZBtn").addEventListener("click", () => deltaAxis("z", +1));
    $("decYawBtn").addEventListener("click", () => deltaYaw(-1));
    $("incYawBtn").addEventListener("click", () => deltaYaw(+1));

    $("resetXYZBtn").addEventListener("click", async () => {
      const name = selectedName();
      if (!name) return;
      await apiControl("lidar_offset_set", { name, x: 0, y: 0, z: 0 });
      await refreshState();
    });
    $("resetYawBtn").addEventListener("click", async () => {
      const name = selectedName();
      if (!name) return;
      await apiControl("lidar_yaw_set", { name, yaw_deg: 0 });
      await refreshState();
    });

    bindEnter(xInput, async () => setAxis("x", xInput.value));
    bindEnter(yInput, async () => setAxis("y", yInput.value));
    bindEnter(zInput, async () => setAxis("z", zInput.value));
    bindEnter(yawInput, async () => setYaw(yawInput.value));
    bindEnter(stepInput, async () => {
      await apiControl("offset_set_step", { step: Number(stepInput.value || 0.01) });
      await refreshState();
    });
    bindEnter(yawStepInput, async () => {
      await apiControl("yaw_set_step", { yaw_step_deg: Number(yawStepInput.value || 0.5) });
      await refreshState();
    });
    bindEnter(alertMinInput, async () => {
      await apiControl("alert_threshold_set", {
        enabled: !!alertEnabled.checked,
        min_m: Number(alertMinInput.value || 0),
        max_m: Number(alertMaxInput.value || 0),
      });
      await refreshState();
    });
    bindEnter(alertMaxInput, async () => {
      await apiControl("alert_threshold_set", {
        enabled: !!alertEnabled.checked,
        min_m: Number(alertMinInput.value || 0),
        max_m: Number(alertMaxInput.value || 0),
      });
      await refreshState();
    });
    bindEnter(viewMinInput, async () => {
      await apiControl("view_angle_set", {
        min_deg: Number(viewMinInput.value || -180.0),
        max_deg: Number(viewMaxInput.value || 180.0),
      });
      await refreshState();
    });
    bindEnter(viewMaxInput, async () => {
      await apiControl("view_angle_set", {
        min_deg: Number(viewMinInput.value || -180.0),
        max_deg: Number(viewMaxInput.value || 180.0),
      });
      await refreshState();
    });
    bindEnter(calibMaxDistInput, async () => {
      await apiControl("calibration_options_set", {
        max_distance_m: Number(calibMaxDistInput.value || 4.0),
        vertical_range_m: Number(calibVertRangeInput.value || 0.35),
        angle_min_deg: Number(calibAngleMinInput.value || -55.0),
        angle_max_deg: Number(calibAngleMaxInput.value || 230.0),
      });
      await refreshState();
    });
    bindEnter(calibVertRangeInput, async () => {
      await apiControl("calibration_options_set", {
        max_distance_m: Number(calibMaxDistInput.value || 4.0),
        vertical_range_m: Number(calibVertRangeInput.value || 0.35),
        angle_min_deg: Number(calibAngleMinInput.value || -55.0),
        angle_max_deg: Number(calibAngleMaxInput.value || 230.0),
      });
      await refreshState();
    });
    bindEnter(calibAngleMinInput, async () => {
      await apiControl("calibration_options_set", {
        max_distance_m: Number(calibMaxDistInput.value || 4.0),
        vertical_range_m: Number(calibVertRangeInput.value || 0.35),
        angle_min_deg: Number(calibAngleMinInput.value || -55.0),
        angle_max_deg: Number(calibAngleMaxInput.value || 230.0),
      });
      await refreshState();
    });
    bindEnter(calibAngleMaxInput, async () => {
      await apiControl("calibration_options_set", {
        max_distance_m: Number(calibMaxDistInput.value || 4.0),
        vertical_range_m: Number(calibVertRangeInput.value || 0.35),
        angle_min_deg: Number(calibAngleMinInput.value || -55.0),
        angle_max_deg: Number(calibAngleMaxInput.value || 230.0),
      });
      await refreshState();
    });

    setInterval(refreshState, 600);
    refreshState();
  </script>
</body>
</html>
